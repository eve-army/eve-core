# HTTP reverse proxy for eve-core. After this works, add TLS:
#   sudo certbot --nginx -d YOUR_DOMAIN
# Certbot will extend this file (or create a companion) with ssl listen :443.
#
# Install: copy to /etc/nginx/sites-available/eve-core, set server_name (e.g. live.eve.army), nginx -t.

upstream eve_core_next {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://eve_core_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long-lived SSE: /api/pumpchat
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
        proxy_cache off;
    }
}

# Optional: after certbot, force HTTPS by uncommenting and merging with certbot’s ssl server:
# server {
#     listen 80;
#     server_name YOUR_DOMAIN;
#     return 301 https://$host$request_uri;
# }
